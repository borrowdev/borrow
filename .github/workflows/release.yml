name: Release
on:
  push:
    branches:
      - main
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v5
        with:
          version: 10.33.0
      - uses: voidzero-dev/setup-vp@v1
        with:
          cache: true
          run-install: true
      - name: Build packages
        run: vp run -F @borrowdev/node build
      - name: Run @borrowdev/node tests
        # TODO: Fix 'vp run test -r' breaking on Cloudflare tests and use it instead.
        working-directory: packages/javascript/node
        run: vp test
  release-packages:
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: google-github-actions/release-please-action@v4
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v5
        with:
          version: 10.33.0
      - uses: voidzero-dev/setup-vp@v1
        with:
          cache: true
          run-install: true
      - name: Publish packages to NPM and JSR
        if: ${{ steps.release.outputs.release_created }}
        run: vp run publish -r
  deploy-docs:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v5
        with:
          version: 10.33.0
      - uses: voidzero-dev/setup-vp@v1
        with:
          cache: true
          run-install: true
      - name: Build and deploy docs website
        working-directory: apps/docs
        run: vp run deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
