name: Release
on:
  push:
    branches:
      - main
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v5
        with:
          version: 10.33.0
      - uses: voidzero-dev/setup-vp@v1
        with:
          cache: true
          run-install: true
      - name: Build packages
        run: vp run -F limiter -F ms build
      - name: Run @borrowdev/limiter tests
        # TODO: Fix 'vp run test -r' breaking on Cloudflare tests and use it instead.
        working-directory: packages/limiter
        run: vp test
      - name: Run @borrowdev/docval tests
        working-directory: packages/docval
        run: vp test
  release-packages:
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}
      - uses: actions/checkout@v6
        # See https://github.com/googleapis/release-please-action/issues/912
        if: ${{ steps.release.outputs.releases_created == 'true' }}
      - uses: pnpm/action-setup@v5
        if: ${{ steps.release.outputs.releases_created == 'true' }}
        with:
          version: 10.33.0
      - uses: voidzero-dev/setup-vp@v1
        if: ${{ steps.release.outputs.releases_created == 'true' }}
        with:
          cache: true
          run-install: true
      - name: Publish Limiter to NPM
        if: ${{ steps.release.outputs['packages/limiter--release_created'] }}
        run: vp run build && pnpm publish --access public --provenance
        working-directory: packages/limiter
      - name: Publish Ms to NPM
        if: ${{ steps.release.outputs['packages/ms--release_created'] }}
        run: vp run build && pnpm publish --access public --provenance
        working-directory: packages/ms
      - name: Publish Data to NPM
        if: ${{ steps.release.outputs['packages/data--release_created'] }}
        run: pnpm publish --access public --provenance
        working-directory: packages/data
      - name: Publish DocVal to NPM
        if: ${{ steps.release.outputs['packages/docval--release_created'] }}
        run: vp run build && pnpm publish --access public --provenance
        working-directory: packages/docval
      - uses: rust-lang/crates-io-auth-action@v1
        if: ${{ steps.release.outputs['packages/cli--release_created'] }}
        id: auth
      - name: Publish CLI to Crates.io
        if: ${{ steps.release.outputs['packages/cli--release_created'] }}
        run: cargo publish -p borrow-dev
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
  deploy-docs:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v5
        with:
          version: 10.33.0
      - uses: voidzero-dev/setup-vp@v1
        with:
          cache: true
          run-install: true
      - name: Build and deploy docs website
        working-directory: apps/docs
        run: vp run deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
