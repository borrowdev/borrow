packages:
  - apps/*
  - packages/**

catalogMode: "strict"
catalog:
  react: "19.0.0"
  react-dom: "19.0.0"
  "@types/react": "19.0.0"
  "@types/react-dom": "19.0.0"
  next: "~15.2.4"
  nextra: "^4.2.17"
  nextra-theme-docs: "^4.2.17"
  "@tailwindcss/postcss": "^4.1.4"
  tailwindcss: "^4.1.4"
  postcss: "^8.5.3"
  typescript: "~5.7.2"
  tslib: "^2.3.0"
  vite: npm:@voidzero-dev/vite-plus-core@latest
  vitest: npm:@voidzero-dev/vite-plus-test@latest
  "@vitest/coverage-v8": "^3.0.5"
  "@vitest/ui": "^3.0.0"
  "@types/node": "^22.14.1"
  zod: "^3.24.3"
  "@upstash/redis": "^1.34.8"
  "@supabase/supabase-js": "^2.49.4"
  fast-check: "^4.1.1"
  resolve-tspaths: "^0.8.23"
  type-fest: "^4.40.0"
  pagefind: "^1.3.0"
  vite-plus: latest
peerDependencyRules:
  allowAny:
    - vite
    - vitest
  allowedVersions:
    vite: "*"
    vitest: "*"
